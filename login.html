<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HU Events | Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
  <header class="header">
    <nav class="navbar container">
      <div class="nav-left">
        <a href="index.html" class="logo">HU Events</a>
      </div>
      <div class="nav-center">
        <div class="main-links">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a href="about.html">About Us</a>
        </div>
      </div>
      <div id="navAuthArea" class="nav-actions"></div>
    </nav>
  </header>

  <main class="auth-layout container">
    <section class="auth-card">
      <h1>Login</h1>
      <p class="helper-text">Sign in to access HU Events pages and dashboards.</p>
      <form id="loginForm" novalidate>
        <label for="loginEmail">Email
          <input id="loginEmail" type="email" required>
        </label>
        <label for="loginPassword">Password
          <input id="loginPassword" type="password" required>
        </label>
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p id="loginMessage" class="message"></p>
      <p class="helper-text">No account yet? <a href="signup.html">Signup</a></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
