<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HU Events | Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="admin-dashboard">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo" style="color: white;"><i class="ph ph-graduation-cap"></i> HU Events</a>
        <button id="closeSidebarBtn" class="mobile-only btn btn-small btn-secondary"><i class="ph ph-x"></i></button>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link active" data-tab="section-overview"><i class="ph ph-chart-bar"></i> Overview</button>
        <button class="sidebar-link" data-tab="section-users"><i class="ph ph-users"></i> Users</button>
        <button class="sidebar-link" data-tab="section-events"><i class="ph ph-calendar-blank"></i> Events</button>
      </nav>
      <div class="sidebar-footer">
        <button id="sidebarLogoutBtn" class="sidebar-logout"><i class="ph ph-sign-out"></i> Logout</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="topbar-left">
          <button id="mobileMenuBtn" class="mobile-menu-btn mobile-only"><i class="ph ph-list"></i></button>
          <span class="page-title" id="topbarTitle">Overview</span>
        </div>
        <div class="topbar-right">
          <span class="user-chip"><i class="ph ph-shield-check"></i> <span id="navUserName"></span></span>
        </div>
      </header>

      <div class="admin-content container">

        <section id="section-overview" class="tab-pane active">
          <h2 class="section-title" style="text-align: left; margin-bottom: 2rem;">University overview</h2>
          <div class="stats-grid">
            <article class="card"><h3><i class="ph ph-users"></i> Total Users</h3><p id="statUsers">0</p></article>
            <article class="card"><h3><i class="ph ph-hourglass"></i> Pending Approval</h3><p id="statPending">0</p></article>
            <article class="card"><h3><i class="ph ph-calendar"></i> Published Events</h3><p id="statPublished">0</p></article>
            <article class="card"><h3><i class="ph ph-ticket"></i> Registrations</h3><p id="statRegistrations">0</p></article>
          </div>
        </section>

        <section id="section-users" class="tab-pane">
          <h2 class="section-title" style="text-align: left; margin-bottom: 1.5rem;">Manage users</h2>
          <p class="helper-text" style="margin-bottom: 1.5rem;">Approve organizers or suspend accounts.</p>
          <div class="table-wrap card" style="padding: 0; overflow: hidden;">
            <table class="data-table" id="adminUsersTable">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="adminUsersBody">
                <tr><td colspan="5" class="helper-text">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section id="section-events" class="tab-pane">
          <h2 class="section-title" style="text-align: left; margin-bottom: 1.5rem;">Moderate events</h2>
          <p class="helper-text" style="margin-bottom: 1.5rem;">Unpublish or cancel events if needed.</p>
          <div id="adminEventsList" class="events-grid"></div>
        </section>

      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
