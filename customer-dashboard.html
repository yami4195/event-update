<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HU Events | Student Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="customer-dashboard">
  <header class="header">
    <nav class="navbar container">
      <div class="nav-left">
        <a href="index.html" class="logo"><i class="ph ph-graduation-cap"></i> HU Events</a>
      </div>
      <div class="nav-center">
        <div class="main-links">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a href="about.html">About Us</a>
        </div>
      </div>
      <div id="navAuthArea" class="nav-actions"></div>
    </nav>
  </header>

  <main class="section" style="background-color: var(--bg-input);">
    <div class="container">
      <div style="margin-bottom: 3rem;">
        <h1 class="section-title" style="text-align: left; margin-bottom: 0.5rem;"><i class="ph ph-student"></i> Student Dashboard</h1>
        <p class="helper-text">Manage your upcoming and registered events.</p>
      </div>

      <div class="dashboard-grid">
        <section class="card" style="padding: 2.5rem; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);">
          <h2 style="display: flex; align-items: center; gap: 0.75rem; border-bottom: 2px solid var(--color-primary-light); padding-bottom: 1rem; margin-bottom: 2rem;"><i class="ph ph-calendar-check" style="color: var(--color-primary);"></i> Registered Events</h2>
          <div id="registeredEventsGrid" class="events-grid"></div>
          <div class="section-actions">
            <button id="seeMoreRegistered" class="btn btn-secondary" type="button">Load More <i class="ph ph-caret-down"></i></button>
          </div>
        </section>

        <section class="card" style="padding: 2.5rem; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);">
          <h2 style="display: flex; align-items: center; gap: 0.75rem; border-bottom: 2px solid var(--color-primary-light); padding-bottom: 1rem; margin-bottom: 2rem;"><i class="ph ph-compass" style="color: var(--color-primary);"></i> Available Events</h2>
          <div id="availableEventsGrid" class="events-grid"></div>
          <div class="section-actions">
            <button id="seeMoreAvailable" class="btn btn-secondary" type="button">Load More <i class="ph ph-caret-down"></i></button>
          </div>
        </section>
      </div>
    </div>
  </main>
  
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 HU Events - Hawassa University</p>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
