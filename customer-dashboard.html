<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HU Events | Student Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="customer-dashboard">
  <header class="header">
    <nav class="navbar container">
      <div class="nav-left">
        <a href="index.html" class="logo">HU Events</a>
      </div>
      <div class="nav-center">
        <div class="main-links">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a href="about.html">About Us</a>
        </div>
      </div>
      <div id="navAuthArea" class="nav-actions"></div>
    </nav>
  </header>

  <main class="section">
    <div class="container dashboard-grid">
      <section>
        <h2>Available Events</h2>
        <div id="availableEventsGrid" class="events-grid"></div>
        <div class="section-actions">
          <button id="seeMoreAvailable" class="btn btn-secondary" type="button">See More</button>
        </div>
      </section>

      <section>
        <h2>Registered Events</h2>
        <div id="registeredEventsGrid" class="events-grid"></div>
        <div class="section-actions">
          <button id="seeMoreRegistered" class="btn btn-secondary" type="button">See More</button>
        </div>
      </section>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
