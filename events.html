<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HU Events | All Events</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="events">
  <header class="header">
    <nav class="navbar container">
      <div class="nav-left">
        <a href="index.html" class="logo"><i class="ph ph-graduation-cap"></i> HU Events</a>
      </div>
      <div class="nav-center">
        <div class="main-links">
          <a href="index.html">Home</a>
          <a class="active" href="events.html">Events</a>
          <a href="about.html">About Us</a>
        </div>
      </div>
      <div id="navAuthArea" class="nav-actions">
        <a class="btn btn-secondary" href="login.html">Login</a>
        <a class="btn btn-primary" href="signup.html">Signup</a>
      </div>
    </nav>
  </header>

  <main class="section">
    <div class="container">
      <h1 class="section-title" style="text-align: left; margin-bottom: 0.5rem;">All Events</h1>
      <p class="helper-text" style="margin-bottom: 2rem;">Browse upcoming and completed events. Use <strong>View Details</strong> for the full description. You must <a href="login.html">login</a> or <a href="signup.html">sign up</a> as a student to register.</p>

      <div class="category-filter-bar" id="categoryFilterBar"></div>

      <div class="filters">
        <select id="categoryFilter">
          <option value="all">All Categories</option>
        </select>
        <select id="dateFilter">
          <option value="all">All Dates</option>
          <option value="upcoming">Upcoming</option>
          <option value="past">Past</option>
        </select>
      </div>

      <div id="eventsGrid" class="events-grid"></div>
      <div class="section-actions">
        <button id="seeMoreEvents" class="btn btn-secondary" type="button">Load More <i class="ph ph-caret-down"></i></button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 HU Events - Hawassa University</p>
    </div>
  </footer>
  <script src="script.js?v=4"></script>
</body>
</html>
