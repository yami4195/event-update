<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Event Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #02061a;
      --surface: rgba(7, 17, 48, 0.86);
      --text: #f8faff;
      --muted: #a8b3d7;
      --primary: #6b63ff;
      --primary-dark: #8f3dff;
      --border: rgba(146, 162, 255, 0.22);
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(850px 420px at 28% 50%, rgba(102, 104, 255, 0.24), transparent 68%),
        radial-gradient(700px 340px at 65% 44%, rgba(139, 61, 255, 0.16), transparent 70%),
        linear-gradient(160deg, #030a26 0%, #02061a 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .card {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 45px rgba(9, 13, 36, 0.55);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 0.9rem;
      color: #c8d2ff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: #ffffff;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 0.85rem;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      margin-top: 0.35rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.72rem 0.85rem;
      font: inherit;
      color: #e9edff;
      background: rgba(2, 8, 29, 0.62);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 0.78rem 1rem;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
      margin-top: 0.35rem;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .error, .success {
      display: none;
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      font-size: 0.9rem;
    }

    .error {
      background: rgba(248, 113, 113, 0.16);
      color: #fecaca;
    }

    .success {
      background: rgba(74, 222, 128, 0.18);
      color: #bbf7d0;
    }

    .switch-link {
      margin-top: 1rem;
      font-size: 0.92rem;
      text-align: center;
      color: var(--muted);
    }

    .switch-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <section class="card" aria-labelledby="signup-title">
    <a class="back-link" href="index.html">&larr; Back to Home</a>
    <h1 id="signup-title">Create Your Account</h1>
    <p class="subtitle">Sign up to start managing and exploring events.</p>

    <div id="errorMessage" class="error" role="alert"></div>
    <div id="successMessage" class="success" role="status"></div>

    <form id="signupForm" novalidate>
      <label for="name">
        Name
        <input type="text" id="name" name="name" placeholder="John Doe" required>
      </label>

      <label for="email">
        Email
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </label>

      <label for="password">
        Password
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </label>

      <label for="role">
        Role
        <select id="role" name="role" required>
          <option value="">Select a role</option>
          <option value="Customer">Customer</option>
          <option value="Organizer">Organizer</option>
        </select>
      </label>

      <button type="submit">Signup</button>
    </form>

    <p class="switch-link">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </section>

  <script>
    const signupForm = document.getElementById("signupForm");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function showMessage(type, message) {
      errorMessage.style.display = "none";
      successMessage.style.display = "none";

      if (type === "error") {
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
      } else {
        successMessage.textContent = message;
        successMessage.style.display = "block";
      }
    }

    signupForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const role = document.getElementById("role").value;

      if (!name || !email || !password || !role) {
        showMessage("error", "Please fill in all fields.");
        return;
      }

      if (!emailRegex.test(email)) {
        showMessage("error", "Please enter a valid email address.");
        return;
      }

      const users = JSON.parse(localStorage.getItem("emsUsers") || "[]");
      const existingUser = users.find((user) => user.email.toLowerCase() === email.toLowerCase());

      if (existingUser) {
        showMessage("error", "An account with this email already exists.");
        return;
      }

      const userData = { name, email, password, role };
      users.push(userData);
      localStorage.setItem("emsUsers", JSON.stringify(users));
      localStorage.setItem("emsCurrentUser", JSON.stringify(userData));

      showMessage("success", "Signup successful! Redirecting...");

      setTimeout(() => {
        if (role === "Organizer") {
          window.location.href = "organizer-dashboard.html";
        } else {
          window.location.href = "customer-dashboard.html";
        }
      }, 700);
    });
  </script>
</body>
</html>
