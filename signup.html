<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HU Events | Signup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="signup">
  <header class="header">
    <nav class="navbar container">
      <div class="nav-left">
        <a href="index.html" class="logo">HU Events</a>
      </div>
      <div class="nav-center">
        <div class="main-links">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a href="about.html">About Us</a>
        </div>
      </div>
      <div id="navAuthArea" class="nav-actions"></div>
    </nav>
  </header>

  <main class="auth-layout container">
    <section class="auth-card">
      <h1>Signup</h1>
      <p class="helper-text">Create your HU Events account as Student or Organizer.</p>
      <form id="signupForm" novalidate>
        <label for="signupName">Full Name
          <input id="signupName" type="text" required>
        </label>
        <label for="signupEmail">Email
          <input id="signupEmail" type="email" required>
        </label>
        <label for="signupPassword">Password
          <input id="signupPassword" type="password" required>
        </label>
        <label for="signupRole">Role
          <select id="signupRole" required>
            <option value="">Select role</option>
            <option value="Student">Student</option>
            <option value="Organizer">Organizer</option>
          </select>
        </label>
        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>
      <p id="signupMessage" class="message"></p>
      <p class="helper-text">Already registered? <a href="login.html">Login</a></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
